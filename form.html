<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forms</title>
    </head>
    <body>
        <h2>Contact Us</h2>
        
        <form>
            <label for="userName">Name: </label>
            <input type="text" name="userName" id="userName" placeholder="Type your name..." required>
            <br><br>

            <label for="userEmail">Email: </label>
            <input type="email" name="userEmail" id="userEmail" placeholder="Type your email..." required>
            <br><br>

            <label for="attendance">Will you be attending?</label><br>
            <input type="radio" name="attendance" id="attendance" value="yes" required> Yes
            <input type="radio" name="attendance" id="attendance" value="no"> No
            <br><br>

            <button type="submit">Submit</button>
        </form>        
    </body>
</html>
